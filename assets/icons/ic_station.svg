<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Gauge station: vertical pole + base + water level indicator -->
  <rect x="11" y="3" width="2" height="14" rx="1" fill="#00e5ff"/>
  <rect x="7" y="17" width="10" height="2" rx="1" fill="#00e5ff"/>
  <rect x="9" y="19" width="6" height="2" rx="1" fill="#00e5ff" opacity="0.6"/>
  <!-- tick marks -->
  <rect x="13" y="6"  width="3" height="1" rx="0.5" fill="#00e5ff" opacity="0.7"/>
  <rect x="13" y="9"  width="3" height="1" rx="0.5" fill="#00e5ff" opacity="0.7"/>
  <rect x="13" y="12" width="3" height="1" rx="0.5" fill="#00e5ff" opacity="0.7"/>
  <!-- water line highlight -->
  <rect x="8" y="10" width="3" height="2" rx="1" fill="#ff6b35" opacity="0.9"/>
</svg>

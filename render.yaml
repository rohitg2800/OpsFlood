services:
- type: web
  name: opsflood
  runtime: docker
  plan: free
  repo: https://github.com/rohitg2800/OpsFlood
  branch: main
  autoDeploy: true
  dockerfilePath: ./Dockerfile
  healthCheckPath: /health
  buildFilter:
    paths:
    - backend/**
    - frontend/**
    - Dockerfile
    - .dockerignore
    - render.yaml
  envVars:
  - key: OPENWEATHER_API_KEY
    sync: false
  - key: FLOOD_SOURCE_POLICY
    value: OFFICIAL_VIEW_ONLY

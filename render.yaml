services:
- type: web
  name: opsflood-api
  runtime: docker       
  plan: free
  repo: https://github.com/rohitg2800/OpsFlood
  branch: main
  autoDeploy: true
  dockerfilePath: ./Dockerfile    
  healthCheckPath: /health
  buildFilter:
    paths:
    - backend/**
    - render.yaml
    - Dockerfile
  envVars:
  - key: OPENWEATHER_API_KEY
    sync: false
  - key: FLOOD_SOURCE_POLICY
    value: OFFICIAL_VIEW_ONLY
  - key: CORS_ORIGINS
    fromService:
      name: opsflood-frontend
      type: web
      envVarKey: RENDER_EXTERNAL_URL

- type: web
  name: opsflood-frontend
  runtime: static
  repo: https://github.com/rohitg2800/OpsFlood
  branch: main
  autoDeploy: true
  buildCommand: cd frontend && npm ci && npm run build
  staticPublishPath: frontend/dist
  buildFilter:
    paths:
    - frontend/**
    - render.yaml
  routes:
  - type: rewrite
    source: /*
    destination: /index.html
  envVars:
  - key: VITE_API_BASE_URL
    fromService:
      name: opsflood-api
      type: web
      envVarKey: RENDER_EXTERNAL_URL
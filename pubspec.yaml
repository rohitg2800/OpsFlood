name: equinox_flood
description: EQUINOX-BR05 - AI-powered flood prediction app
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  html: ^0.15.4

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking & parsing
  http: ^1.2.0
  # xml 6.x required by pdf ^3.10.8 (pdf pins xml ^6.3.0)
  xml: ^6.3.0

  # State management
  flutter_riverpod: ^3.3.1

  # Config
  flutter_dotenv: ^6.0.1

  # Firebase suite (all on FlutterFire core_platform_interface ^7)
  # firebase_storage ^13.0.2 is the first storage release on ^7.x
  firebase_core:      ^4.9.0
  firebase_messaging: ^16.2.2
  cloud_firestore:    ^6.4.1
  firebase_storage:   ^13.0.2

  # Background tasks
  workmanager: ^0.9.0+3

  # Charts
  fl_chart: ^1.2.0

  # Storage & prefs
  shared_preferences: ^2.3.0

  # i18n
  intl: ^0.20.2

  # Links
  url_launcher: ^6.3.0

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # Network status
  connectivity_plus: ^7.1.1

  # Ads
  google_mobile_ads: ^4.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # Sharing — ^10.1.0 satisfies web ^1.0.0 (required by geolocator ^13)
  share_plus: ^10.1.0

  # ── Module 2: Branding & Icons ───────────────────────────────────────────────
  flutter_svg: ^2.0.10

  # ── Module 3: Maps ───────────────────────────────────────────────────────────
  flutter_map: ^8.1.1
  latlong2:    ^0.9.1

  # ── Module 5: Community & Offline (Hive runtime — no codegen needed at build time)
  hive:         ^2.2.3
  hive_flutter: ^1.1.0
  uuid:         ^4.4.2

  # ── Module 6: Media, Image Attachments & Export ─────────────────────────────
  image_picker:  ^1.1.2
  pdf:           ^3.10.8
  csv:           ^6.0.0
  path_provider: ^2.1.4

  # GPS — nearby station detection
  geolocator: ^13.0.4

  # Crowd report timestamps
  timeago: ^3.7.0

  # AI flood background monitoring service
  flutter_background_service: ^5.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1
  # NOTE: hive_generator (last release 2 years ago) pins analyzer ^4.6/<7.0.0
  # which conflicts with build_runner ^2.5+ (requires analyzer ^8.x via test 1.31.0).
  # Hive TypeAdapters are already generated — these tools are not needed at runtime.
  # To regenerate adapters in future: temporarily pin build_runner: 2.4.9 locally.
  # hive_generator: ^2.0.1  # REMOVED — abandoned package, breaks analyzer
  # build_runner:   ^2.4.9  # REMOVED — not needed unless regenerating .g.dart files

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/opsflood_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#0d1b2a"
  adaptive_icon_foreground: assets/icon/opsflood_icon.png

flutter_native_splash:
  color: "#0d1b2a"
  color_dark: "#0d1b2a"
  image: assets/splash/opsflood_splash_logo.png
  image_dark: assets/splash/opsflood_splash_logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#0d1b2a"
    color_dark: "#0d1b2a"
    image: assets/splash/opsflood_splash_logo.png
    image_dark: assets/splash/opsflood_splash_logo.png
    icon_background_color: "#0d1b2a"
    icon_background_color_dark: "#0d1b2a"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/icon/
    - assets/fonts/
    - assets/icons/
    - assets/splash/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

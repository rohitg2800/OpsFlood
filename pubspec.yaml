name: floodops_app
description: OpsFlood - AI-powered flood prediction app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  flutter_riverpod: ^2.5.1
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.3
  workmanager: ^0.9.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.2.4
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

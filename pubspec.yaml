name: equinox_flood
description: EQUINOX-BR05 - AI-powered flood prediction app
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  html: ^0.15.4

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking & parsing
  http: ^1.2.0
  xml: ^7.0.1

  # State management
  flutter_riverpod: ^3.3.1

  # Config
  flutter_dotenv: ^6.0.1

  # Firebase suite
  firebase_core:      ^4.9.0
  firebase_messaging: ^16.2.2
  cloud_firestore:    ^6.4.1

  # Background tasks
  workmanager: ^0.9.0+3

  # Charts
  fl_chart: ^1.2.0

  # Storage & prefs
  shared_preferences: ^2.3.0

  # i18n
  intl: ^0.20.2

  # Links
  url_launcher: ^6.3.0

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # Network status
  connectivity_plus: ^7.1.1

  # Ads
  google_mobile_ads: ^4.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # Sharing — Phase 4 (WhatsApp / share-sheet alert sharing)
  share_plus: ^9.0.0

  # ── Module 2: Branding & Icons ───────────────────────────────────────────────
  # SVG rendering for icon set and app logo
  flutter_svg: ^2.0.10

  # ── Phase 2 ─────────────────────────────────────────────────────────────────
  # GPS — nearby station detection
  geolocator: ^13.0.4

  # ── Phase 3 ─────────────────────────────────────────────────────────────────
  # Real map tiles + GeoJSON overlays — Bihar River Map
  flutter_map: ^8.1.1
  latlong2:    ^0.9.1

  # AI flood background monitoring service
  flutter_background_service: ^5.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  # ── Module 2: branded native splash ─────────────────────────────────────────
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/opsflood_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#0d1b2a"
  adaptive_icon_foreground: assets/icon/opsflood_icon.png

flutter_native_splash:
  color: "#0d1b2a"
  color_dark: "#0d1b2a"
  image: assets/splash/opsflood_splash_logo.png
  image_dark: assets/splash/opsflood_splash_logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#0d1b2a"
    color_dark: "#0d1b2a"
    image: assets/splash/opsflood_splash_logo.png
    image_dark: assets/splash/opsflood_splash_logo.png
    icon_background_color: "#0d1b2a"
    icon_background_color_dark: "#0d1b2a"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/icon/
    - assets/fonts/
    - assets/icons/        # Module 2 SVG icon set
    - assets/splash/       # Module 2 splash logo

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

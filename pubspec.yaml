name: floodops_app
description: Equinox - AI-powered flood prediction app
publish_to: 'none'
version: 2.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ───────────────────────────────────────────────────────────────────
  http: ^1.2.0

  # ── Charts ────────────────────────────────────────────────────────────────────
  fl_chart: ^1.2.0

  # ── Persistence ──────────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── Localisation / formatting ───────────────────────────────────────────────
  intl: ^0.20.2

  # ── Launch URLs ──────────────────────────────────────────────────────────────────
  url_launcher: ^6.2.5

  # ── Notifications ─────────────────────────────────────────────────────────────────
  flutter_local_notifications: ^21.0.0

  # ── Network state ────────────────────────────────────────────────────────────────
  connectivity_plus: ^7.1.1

  # ── Map package for india_river_explorer_screen.dart ───────────────────────
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # ── Background fetch ─────────────────────────────────────────────────────────────
  workmanager: ^0.6.0

  # ── Icons ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

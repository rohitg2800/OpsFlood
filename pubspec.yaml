name: equinox_flood
description: EQUINOX-BR05 - AI-powered flood prediction app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking & parsing
  http: ^1.2.0
  xml: ^7.0.1

  # State management
  flutter_riverpod: ^3.3.1

  # Config
  flutter_dotenv: ^6.0.1

  # Firebase suite
  firebase_core:      ^4.9.0
  firebase_messaging: ^16.2.2
  cloud_firestore:    ^6.4.1

  # Background tasks
  workmanager: ^0.9.0+3

  # Charts
  fl_chart: ^1.2.0

  # Storage & prefs
  shared_preferences: ^2.3.0

  # i18n
  intl: ^0.20.2

  # Links
  url_launcher: ^6.3.0

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # Network status
  connectivity_plus: ^7.1.1

  # Ads — v4.x is compatible with AGP 8.x / Gradle 9.x
  google_mobile_ads: ^4.0.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/opsflood_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#0d1b2a"
  adaptive_icon_foreground: assets/icon/opsflood_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icon/

name: floodops_app
description: OpsFlood - AI-powered flood prediction app
publish_to: 'none'
version: 2.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ──────────────────────────────────────────────────────────────
  http: ^1.2.0

  # ── Charts ──────────────────────────────────────────────────────────────────
  fl_chart: ^1.2.0

  # ── Persistence ─────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── Localisation / formatting ───────────────────────────────────────────────
  intl: ^0.20.2

  # ── Launch URLs ─────────────────────────────────────────────────────────────
  url_launcher: ^6.2.5

  # ── Notifications ───────────────────────────────────────────────────────────
  flutter_local_notifications: ^21.0.0

  # ── Network state ───────────────────────────────────────────────────────────
  connectivity_plus: ^7.1.1

  # ── FIX #6: Map package for india_river_explorer_screen.dart ────────────────
  #   flutter_map renders OpenStreetMap / any tile source without needing
  #   an API key. latlong2 provides the LatLng coordinate type it requires.
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # ── P0: Background fetch so polling survives app being backgrounded ──────────
  #   workmanager schedules a periodic background task (min 15-min on Android)
  #   that calls RealTimeService.refreshData() even when app is not foreground.
  workmanager: ^0.5.2

  # ── Icons ───────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

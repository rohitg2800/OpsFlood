// android/app/build.gradle
// OpsFlood — Module 9: Release build config

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'
def flutterSdkPath    = localProperties.getProperty('flutter.sdk')
assert flutterSdkPath != null, "flutter.sdk not set in local.properties"

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterSdkPath/packages/flutter_tools/gradle/flutter.gradle"

android {
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.opsflood.app"
        minSdkVersion    21
        targetSdkVersion 34
        versionCode      flutterVersionCode.toInteger()
        versionName      flutterVersionName
        multiDexEnabled  true

        // Only ship arm64 + x86_64 in release to halve APK size
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    signingConfigs {
        release {
            // Read from env vars set in CI (GitHub Actions secret)
            storeFile     file(System.getenv('KEYSTORE_PATH')    ?: 'keystore/upload.jks')
            storePassword System.getenv('KEYSTORE_PASSWORD')     ?: ''
            keyAlias      System.getenv('KEY_ALIAS')             ?: 'upload'
            keyPassword   System.getenv('KEY_PASSWORD')          ?: ''
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
        release {
            signingConfig         signingConfigs.release
            minifyEnabled         true
            shrinkResources       true
            proguardFiles         getDefaultProguardFile('proguard-android-optimize.txt'),
                                  'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.multidex:multidex:2.0.1'
}

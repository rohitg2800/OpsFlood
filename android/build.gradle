// Top-level build.gradle
// AGP 8.7+ / Gradle 9.1 compatible
// Flutter built-in Kotlin: do NOT declare kotlin-gradle-plugin here.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // AGP 8.7 is compatible with Gradle 9.1
        classpath 'com.android.tools.build:gradle:8.7.0'
        // Kotlin is injected automatically by dev.flutter.flutter-gradle-plugin
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

tasks.register('clean', Delete) {
    delete rootProject.layout.buildDirectory
}
